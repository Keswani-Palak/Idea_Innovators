<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PlayVerse — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0B0B0F;--violet:#8A2BE2;--muted:#9aa0b2}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:#e8eaf6;font-family:Roboto,system-ui,-apple-system,Segoe UI,Arial;padding:28px}
    .container{max-width:980px;margin:0 auto}
    .header{display:flex;gap:18px;align-items:center}
    .avatar-lg{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--violet),#b266ff);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:#061018;animation:floaty 6s ease-in-out infinite;transition:transform .3s}
.avatar-lg:hover{transform:scale(1.08)}

@keyframes floaty{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
    .meta{display:flex;flex-direction:column}
    .username{font-size:22px;font-weight:800}
    .bio{color:var(--muted);margin-top:6px}
    .lvl-badge{margin-top:8px;background:linear-gradient(90deg,rgba(138,43,226,0.08),rgba(138,43,226,0.02));padding:6px 10px;border-radius:999px;color:var(--violet);font-weight:700}
    .edit{margin-left:12px;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);cursor:pointer}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
    .stat{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:14px;border-radius:10px;text-align:center;transition:transform .2s,box-shadow .2s}
.stat:hover{transform:scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
    .stat .num{font-weight:800;font-size:18px}
    .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:18px}
    .badge{padding:12px;border-radius:10px;background:#0f1220;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .2s}
.badge:hover{transform:scale(1.06)}
    .badge.locked{opacity:0.36;filter:grayscale(1)}
    .sub{margin-top:18px;padding:14px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))}
    .primary{background:linear-gradient(90deg,var(--violet),#b266ff);color:#061018;padding:10px;border-radius:8px;border:0;cursor:pointer;font-weight:800}
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1 style="margin:0">Profile</h1>
      <a href="../pages/dashboard.html" style="color:var(--muted);text-decoration:none">Back to Dashboard</a>
    </div>

    <div class="header">
      <div class="avatar-lg">P</div>
      <div class="meta">
        <div style="display:flex;align-items:center">
          <div class="username">Palak</div>
          <button class="edit">Edit Profile</button>
        </div>
        <div class="bio">Gamer • Explorer • Collector</div>
        <div class="lvl-badge">Level 12</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num">124</div><div style="color:var(--muted)">Games Played</div></div>
      <div class="stat"><div class="num">87</div><div style="color:var(--muted)">Wins</div></div>
      <div class="stat"><div class="num">7</div><div style="color:var(--muted)">Streak</div></div>
      <div class="stat"><div class="num">34</div><div style="color:var(--muted)">Achievements</div></div>
    </div>

    <h3 style="margin-top:20px">Achievements</h3>
    <div class="ach-grid">
      <div class="badge"><div style="font-size:22px">🏅</div><div style="font-weight:700">First Win</div></div>
      <div class="badge"><div style="font-size:22px">🔥</div><div style="font-weight:700">7 Day Streak</div></div>
      <div class="badge locked"><div style="font-size:22px">🎯</div><div style="font-weight:700">Perfect Score</div></div>
      <div class="badge"><div style="font-size:22px">⭐</div><div style="font-weight:700">Collector</div></div>
    </div>

    <div class="sub">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800">Subscription</div>
          <div style="color:var(--muted);margin-top:6px">Free — Benefits: Basic cloud saves, limited leaderboards</div>
        </div>
        <div>
          <button class="primary">Upgrade</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    // fade-in stats and badges
    document.addEventListener('DOMContentLoaded', ()=>{
      document.querySelectorAll('.stat, .badge').forEach((el,i)=>{
        el.style.opacity=0;
        el.style.transform+=' translateY(10px)';
        setTimeout(()=>{
          el.style.transition='opacity .5s ease,transform .5s ease';
          el.style.opacity=1;
          el.style.transform=el.style.transform.replace(' translateY(10px)','');
        }, 120*i);
      });
    });
  </script>
</body>
</html>
