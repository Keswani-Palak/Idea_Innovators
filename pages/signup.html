<!DOCTYPE html>
<html>
<head>
<title>Sign Up - PlayVerse</title>
<link rel="stylesheet" href="../styles/auth.css">
<link rel="stylesheet" href="../styles/common.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p class="auth-subtitle">Join the SKYVERSE</p>
        </div>

        <form id="signupForm" class="auth-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="su-username">Username</label>
                <input id="su-username" class="form-input" type="text" placeholder="Choose a username" required>
                <span class="error-message" id="suUsernameError"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="su-email">Email</label>
                <input id="su-email" class="form-input" type="email" placeholder="you@example.com" required>
                <span class="error-message" id="suEmailError"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="su-password">Password</label>
                <input id="su-password" class="form-input" type="password" placeholder="Create a password" required>
                <span class="error-message" id="suPasswordError"></span>
            </div>

            <button type="button" class="btn btn-primary btn-large" onclick="window.location.href='login.html'">Sign Up</button>
        </form>
    </div>
</div>

</body>
</html>
